<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job History</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #f5f5f5; padding: 1rem; line-height: 1.4; text-transform: uppercase; }
    input, select, button { font-family: inherit; font-size: inherit; text-transform: uppercase; }
    input::placeholder { text-transform: uppercase; }
  </style>
</head>
<body>
<div style="padding: 0.5rem 0; max-width: 650px; margin: 0 auto;">

<div id="message" style="margin-bottom: 0.5rem;"></div>
<div id="durPopup" style="display:none; position:absolute; background:#222; color:#fff; font-size:12px; padding:4px 10px; border-radius:6px; pointer-events:none; z-index:2000; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.25);"></div>

<!-- Gap modal -->
<div id="gapModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:10px; padding:1.25rem; width:380px; max-width:95vw; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="font-weight:600; font-size:14px; margin-bottom:0.75rem; color:#333;">Add Unemployment Period</div>
    <div id="gapModalInfo" style="font-size:12px; color:#888; margin-bottom:1rem;"></div>
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
      <label style="display:flex; align-items:center; gap:5px; font-size:13px; cursor:pointer;">
        <input type="radio" name="gapOption" value="entire" checked onchange="toggleGapPartial(false)" /> Entire gap
      </label>
      <label style="display:flex; align-items:center; gap:5px; font-size:13px; cursor:pointer; margin-left:1rem;">
        <input type="radio" name="gapOption" value="partial" onchange="toggleGapPartial(true)" /> Part of gap
      </label>
    </div>
    <div id="gapPartialDates" style="display:none; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:1rem;">
      <div>
        <label style="font-size:11px; color:#666; display:block; margin-bottom:3px;">Start date</label>
        <input type="date" id="gapStartInput" style="width:100%; padding:5px 8px; border:1px solid #ddd; border-radius:6px; font-size:12px;" />
      </div>
      <div>
        <label style="font-size:11px; color:#666; display:block; margin-bottom:3px;">End date</label>
        <input type="date" id="gapEndInput" style="width:100%; padding:5px 8px; border:1px solid #ddd; border-radius:6px; font-size:12px;" />
      </div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button onclick="closeGapModal()" style="padding:6px 14px; font-size:13px; border:1px solid #ddd; background:white; border-radius:8px; cursor:pointer;">Cancel</button>
      <button onclick="confirmGapModal()" style="padding:6px 14px; font-size:13px; background:#7F77DD; border:1px solid #7F77DD; color:white; border-radius:8px; cursor:pointer; font-weight:500;">Add Unemployment</button>
    </div>
  </div>
</div>

<div style="background: #f0f0f0; border-radius: 8px; padding: 0.6rem 0.75rem; margin-bottom: 0.75rem;">
  <div style="display: flex; flex-wrap: wrap; gap: 6px; align-items: center;">
    <input type="text" id="title" placeholder="Job title" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; flex: 1; min-width: 140px;" />
    <input type="date" id="startDate" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; flex: 1; min-width: 120px;" />
    <input type="date" id="endDate" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; flex: 1; min-width: 120px;" />
    <select id="category" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;">
      <option value="broadway">Broadway & Theatre</option>
      <option value="education">Education</option>
      <option value="healthcare">Healthcare</option>
      <option value="fitness">Fitness</option>
      <option value="unemployed">Unemployed</option>
      <option value="other">Other</option>
    </select>
    <div style="display: flex; gap: 5px; width: 100%; justify-content: center;">
      <button id="addBtn" style="padding: 5px 9px; background: #4CAF50; border: 1px solid #4CAF50; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 400; line-height: 1;">+</button>
      <button id="exportBtn" style="padding: 5px 9px; background: #378ADD; border: 1px solid #378ADD; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 400; line-height: 1;">↓</button>
      <label style="padding: 5px 9px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1;">↑<input type="file" id="importFile" accept=".json" style="display:none;" /></label>
      <button id="pdfBtn" style="padding: 5px 9px; background: #c0392b; border: 1px solid #c0392b; color: white; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; line-height: 1; letter-spacing: 0.5px;">PDF</button>
      <button id="resetBtn" style="padding: 5px 9px; border: 1px solid #ffcccc; background: white; border-radius: 6px; cursor: pointer; font-size: 16px; color: #c33; line-height: 1;">✕</button>
    </div>
  </div>
</div>

<div style="display: flex; flex-direction: column; gap: 0.35rem;" id="timeline"></div>

<div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 0.75rem; padding-top: 0.6rem; border-top: 1px solid #ddd; font-size: 11px; justify-content: center;">
  <div style="display: flex; align-items: center; gap: 4px;"><div style="width: 12px; height: 12px; border-radius: 3px; background: #D4537E;"></div> <span>Broadway & Theatre</span></div>
  <div style="display: flex; align-items: center; gap: 4px;"><div style="width: 12px; height: 12px; border-radius: 3px; background: #378ADD;"></div> <span>Education</span></div>
  <div style="display: flex; align-items: center; gap: 4px;"><div style="width: 12px; height: 12px; border-radius: 3px; background: #1D9E75;"></div> <span>Healthcare</span></div>
  <div style="display: flex; align-items: center; gap: 4px;"><div style="width: 12px; height: 12px; border-radius: 3px; background: #BA7517;"></div> <span>Fitness</span></div>
  <div style="display: flex; align-items: center; gap: 4px;"><div style="width: 12px; height: 12px; border-radius: 3px; background: #7F77DD;"></div> <span>Unemployed</span></div>
</div>
</div>

<script>
const STORAGE_KEY = 'career_timeline_entries';

const defaultData = {
  2009: [{ title: 'Student at FSU', dates: '6/29/2009 -', category: 'education' }],
  2015: [{ title: 'Student at FSU', dates: '5/2/2015', category: 'education' }, { title: 'Beauty & the Beast', dates: 'June 2015 -', category: 'broadway' }],
  2016: [{ title: 'Beauty & the Beast', dates: 'Feb 2016', category: 'broadway' }, { title: 'Barry\'s Bootcamp', dates: '2016', category: 'fitness' }, { title: 'Swerve Fitness', dates: '2016', category: 'fitness' }, { title: 'Equinox', dates: '2016', category: 'fitness' }],
  2017: [{ title: 'Fulton Theatre', dates: '3/14/2017 - 4/2/2017', category: 'broadway' }, { title: 'ZACH Theatre', dates: 'May 2017 - 7/2/2017', category: 'broadway' }, { title: 'On Your Feet Broadway', dates: '7/3/2017 - 7/30/2017', category: 'broadway' }, { title: 'Unemployed', dates: '7/31/2017 - 8/7/2017', category: 'unemployed' }, { title: 'Lyric OKC', dates: '8/8/2017 - 8/13/2017', category: 'broadway' }, { title: 'Unemployed', dates: '8/14/2017 - 8/28/2017', category: 'unemployed' }, { title: 'On Your Feet Tour', dates: '8/29/2017 -', category: 'broadway' }],
  2018: [{ title: 'On Your Feet Tour', dates: '- 10/7/2018', category: 'broadway' }, { title: 'On Your Feet Tour', dates: '10/30/2018 - 11/4/2018', category: 'broadway' }, { title: 'Unemployed', dates: '11/5/2018 - 11/11/2018', category: 'unemployed' }, { title: 'On Your Feet', dates: '11/12/2018 - 11/18/2018', category: 'broadway' }, { title: 'Apple', dates: 'November 2018 -', category: 'broadway' }],
  2019: [{ title: 'Apple', dates: 'April 2019', category: 'broadway' }, { title: 'The Band\'s Visit Tour', dates: '5/20/2019 -', category: 'broadway' }],
  2020: [{ title: 'The Band\'s Visit Tour', dates: '3/29/2020', category: 'broadway' }, { title: 'Unemployed', dates: '3/30/2020 - September 2020', category: 'unemployed' }, { title: 'Hialeah Hospital', dates: 'September -', category: 'healthcare' }],
  2021: [{ title: 'Hialeah Hospital', dates: 'April 2021', category: 'healthcare' }, { title: 'Unemployed', dates: 'May 2021', category: 'unemployed' }, { title: 'Student at Columbia', dates: 'June 2021 -', category: 'education' }],
  2022: [{ title: 'Student at Columbia', dates: '10/9/2022', category: 'education' }, { title: 'NYU Langone', dates: '10/10/2022 -', category: 'healthcare' }],
  2023: [{ title: 'NYU Langone', dates: '3/6/2023', category: 'healthcare' }, { title: 'NYP', dates: '3/6/2023 - 8/16/2023', category: 'healthcare' }, { title: 'Moulin Rouge Tour', dates: '8/22/2023 -', category: 'broadway' }],
  2026: [{ title: 'Moulin Rouge Tour', dates: '8/9/2026', category: 'broadway' }, { title: 'Unemployed', dates: '8/10/2026 - 9/13/2026', category: 'unemployed' }, { title: 'Newark Beth Israel Medical Center', dates: '9/14/2026 - Current', category: 'healthcare' }]
};

let data = loadData();
let activeFilter = 'all';
let editingEntry = null;
let collapsedYears = new Set(JSON.parse(localStorage.getItem('collapsed_years') || '[]'));

const colors = { broadway: '#D4537E', education: '#378ADD', healthcare: '#1D9E75', fitness: '#BA7517', unemployed: '#7F77DD', other: '#888780' };

function loadData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(defaultData));
}

function sortData() {
  Object.keys(data).forEach(year => {
    data[year].sort((a, b) => {
      const aStr = a.dates.split('-')[0].trim();
      const bStr = b.dates.split('-')[0].trim();
      const aDate = parseDate(aStr) || new Date(0);
      const bDate = parseDate(bStr) || new Date(0);
      return aDate - bDate;
    });
  });
}

function saveData() {
  sortData();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function parseDate(dateStr) {
  if (!dateStr || dateStr === '-' || dateStr.includes('Current')) return null;
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  let cleanStr = dateStr.trim();
  const monthIdx = monthNames.findIndex(m => cleanStr.toLowerCase().includes(m.toLowerCase()));
  if (monthIdx !== -1) {
    const yearMatch = cleanStr.match(/\d{4}/);
    if (yearMatch) return new Date(parseInt(yearMatch[0]), monthIdx, 1);
  }
  const parts = cleanStr.split('/');
  if (parts.length >= 2) {
    const month = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]) || 1;
    const year = parseInt(parts[2]) || new Date().getFullYear();
    return new Date(year, month, day);
  }
  return null;
}

function dateObjToString(dateObj) {
  const year = dateObj.getFullYear();
  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
  const day = String(dateObj.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function formatDisplayDate(dateStr) {
  if (!dateStr || dateStr === 'Current') return dateStr;
  const trimmed = dateStr.trim();
  if (!trimmed) return trimmed;
  // Only reformat MM/DD/YYYY — leave "June 2021", "2016", etc. as-is
  if (trimmed.split('/').length === 3) {
    const parsed = parseDate(trimmed);
    if (parsed) return parsed.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  return trimmed;
}

function formatDisplayDates(datesStr) {
  const parts = datesStr.split('-').map(d => d.trim());
  if (parts.length === 1) return formatDisplayDate(parts[0]);
  const start = formatDisplayDate(parts[0]);
  const end = parts[1] !== '' ? formatDisplayDate(parts[1]) : '';
  if (start && end) return `${start} - ${end}`;
  if (start) return `${start} -`;
  if (end) return `- ${end}`;
  return datesStr;
}

function buildGapMap() {
  const allEntries = [];
  Object.keys(data).forEach(year => {
    data[year].forEach((entry, idx) => {
      const dateParts = entry.dates.split('-').map(d => d.trim());
      const startDate = parseDate(dateParts[0]);
      const endDate = dateParts.length > 1 && dateParts[1] !== '' ? parseDate(dateParts[1]) : null;
      if (startDate || endDate) {
        allEntries.push({ year, idx, title: entry.title, startDate, endDate, category: entry.category });
      }
    });
  });
  allEntries.sort((a, b) => {
    const aStart = a.startDate || a.endDate || new Date(0);
    const bStart = b.startDate || b.endDate || new Date(0);
    return aStart - bStart;
  });
  const gapMap = {};
  for (let i = 0; i < allEntries.length - 1; i++) {
    const current = allEntries[i];
    const next = allEntries[i + 1];
    const currentEnd = current.endDate || current.startDate || new Date(0);
    const nextStart = next.startDate || next.endDate || new Date(9999, 0, 1);
    if (currentEnd && nextStart && currentEnd < nextStart) {
      const gapDays = Math.floor((nextStart - currentEnd) / (1000 * 60 * 60 * 24));
      if (gapDays > 1) {
        const key = `${current.year}-${current.idx}`;
        const gapStart = new Date(currentEnd.getTime() + 86400000);
        const gapEnd = new Date(nextStart.getTime() - 86400000);
        gapMap[key] = { days: gapDays, nextTitle: next.title, gapStart, gapEnd };
      }
    }
  }
  return gapMap;
}

function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';
  const cats = ['all', 'broadway', 'education', 'healthcare', 'fitness', 'unemployed'];
  const labels = { all: 'All', broadway: 'Broadway & Theatre', education: 'Education', healthcare: 'Healthcare', fitness: 'Fitness', unemployed: 'Unemployed' };
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.textContent = labels[cat];
    btn.className = cat === 'all' ? 'active' : '';
    btn.style.cssText = `padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: ${cat === activeFilter ? '500' : '400'};`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
      renderTimeline();
    });
    container.appendChild(btn);
  });
}

function renderTimeline() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  Object.keys(_durMap).forEach(k => delete _durMap[k]);
  const gapMap = buildGapMap();

  // Collect all years, adding intermediate years for explicit multi-year spans
  const allYears = new Set(Object.keys(data).map(Number));
  Object.keys(data).forEach(yearKey => {
    data[yearKey].forEach(entry => {
      const dateParts = entry.dates.split('-').map(d => d.trim());
      const startDate = parseDate(dateParts[0]);
      const endStr = dateParts.length > 1 ? dateParts[1] : null;
      const endDate = endStr && endStr !== '' ? parseDate(endStr) : null;
      if (startDate && endDate) {
        const sy = startDate.getFullYear();
        const ey = endDate.getFullYear();
        for (let y = sy + 1; y <= ey; y++) allYears.add(y);
      }
    });
  });

  Array.from(allYears).sort((a, b) => a - b).forEach(year => {
    const yearStr = String(year);
    const yearEntries = (data[yearStr] || []).filter(entry => activeFilter === 'all' || entry.category === activeFilter);

    // Find entries from prior years with explicit end dates reaching into this year
    const continuations = [];
    Object.keys(data).forEach(dataYear => {
      if (parseInt(dataYear) >= year) return;
      data[dataYear].forEach(entry => {
        if (activeFilter !== 'all' && entry.category !== activeFilter) return;
        const dateParts = entry.dates.split('-').map(d => d.trim());
        const startDate = parseDate(dateParts[0]);
        const endStr = dateParts.length > 1 ? dateParts[1] : null;
        const endDate = endStr && endStr !== '' ? parseDate(endStr) : null;
        if (startDate && endDate && startDate.getFullYear() < year && endDate.getFullYear() >= year) {
          continuations.push({ entry, fromYear: dataYear, endDate, isEnding: endDate.getFullYear() === year });
        }
      });
    });

    if (yearEntries.length === 0 && continuations.length === 0) return;

    const isCollapsed = collapsedYears.has(year);
    const yearSection = document.createElement('div');
    const yearHeader = document.createElement('div');
    yearHeader.style.cssText = 'font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 5px;';
    yearHeader.innerHTML = `<span style="font-size:9px;">${isCollapsed ? '▶' : '▼'}</span>${year}`;
    yearHeader.addEventListener('click', () => {
      if (collapsedYears.has(year)) collapsedYears.delete(year);
      else collapsedYears.add(year);
      localStorage.setItem('collapsed_years', JSON.stringify([...collapsedYears]));
      renderTimeline();
    });
    yearSection.appendChild(yearHeader);
    if (isCollapsed) { timeline.appendChild(yearSection); return; }

    // Render continuation entries at the top of the year
    continuations.forEach(({ entry, endDate, isEnding }) => {
      const color = colors[entry.category] || colors.other;
      const entryDiv = document.createElement('div');
      entryDiv.style.cssText = `display: flex; align-items: center; margin-bottom: 0.1rem; border-left: 3px ${isEnding ? 'solid' : 'dashed'} ${color}; background: ${color}${isEnding ? '18' : '0d'}; border-radius: 0 6px 6px 0; padding: 2px 8px; opacity: ${isEnding ? '1' : '0.75'};`;
      const title = document.createElement('p');
      title.style.cssText = `font-size: 13px; color: ${isEnding ? '#333' : '#666'}; margin: 0; font-style: italic; flex: 1;`;
      const endLabel = endDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      title.innerHTML = isEnding
        ? `${entry.title} <span style="font-size:11px;color:#aaa;">ends ${endLabel}</span>`
        : entry.title;
      entryDiv.appendChild(title);
      yearSection.appendChild(entryDiv);
    });

    yearEntries.forEach((entry, idx) => {
      const isEditing = editingEntry && editingEntry.year === yearStr && editingEntry.index === idx;
      const gapKey = `${yearStr}-${idx}`;
      const gap = gapMap[gapKey];
      const color = colors[entry.category] || colors.other;

      // Check if this entry has an explicit end date in a future year
      const dateParts = entry.dates.split('-').map(d => d.trim());
      const entryStartDate = parseDate(dateParts[0]);
      const entryEndStr = dateParts.length > 1 ? dateParts[1] : null;
      const entryEndDate = entryEndStr && entryEndStr !== '' ? parseDate(entryEndStr) : null;
      const spansYears = entryStartDate && entryEndDate && entryEndDate.getFullYear() > entryStartDate.getFullYear();

      const entryDiv = document.createElement('div');
      entryDiv.style.cssText = `display: flex; align-items: center; margin-bottom: 0.1rem; border-left: 3px solid ${color}; background: ${color}18; border-radius: 0 6px 6px 0; padding: 2px 8px;`;
      const content = document.createElement('div');
      content.style.cssText = 'flex: 1;';
      if (isEditing) {
        const startDate = parseDate(dateParts[0]);
        const endDate = dateParts.length > 1 && dateParts[1] !== '' ? parseDate(dateParts[1]) : null;
        content.innerHTML = `
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 4px;">
            <input type="text" id="edit-title-${idx}" value="${entry.title}" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;" />
            <input type="date" id="edit-start-${idx}" value="${startDate ? dateObjToString(startDate) : ''}" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;" />
            <input type="date" id="edit-end-${idx}" value="${endDate ? dateObjToString(endDate) : ''}" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;" />
            <select id="edit-category-${idx}" style="padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;">
              <option value="broadway" ${entry.category === 'broadway' ? 'selected' : ''}>Broadway & Theatre</option>
              <option value="education" ${entry.category === 'education' ? 'selected' : ''}>Education</option>
              <option value="healthcare" ${entry.category === 'healthcare' ? 'selected' : ''}>Healthcare</option>
              <option value="fitness" ${entry.category === 'fitness' ? 'selected' : ''}>Fitness</option>
              <option value="unemployed" ${entry.category === 'unemployed' ? 'selected' : ''}>Unemployed</option>
              <option value="other" ${entry.category === 'other' ? 'selected' : ''}>Other</option>
            </select>
            <div style="display: flex; gap: 5px;">
              <button id="save-${idx}" style="padding: 5px 10px; background: #4CAF50; border: 1px solid #4CAF50; color: white; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;">Save</button>
              <button id="cancel-${idx}" style="padding: 5px 10px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 12px;">Cancel</button>
            </div>
          </div>
        `;
        setTimeout(() => {
          document.getElementById(`save-${idx}`)?.addEventListener('click', () => saveEdit(yearStr, idx));
          document.getElementById(`cancel-${idx}`)?.addEventListener('click', cancelEdit);
        }, 0);
      } else {
        const header = document.createElement('div');
        header.style.cssText = 'display: flex; justify-content: space-between; align-items: center; gap: 8px;';
        const title = document.createElement('p');
        title.style.cssText = 'font-size: 13px; color: #333; margin: 0; flex: 1;';
        const durId = `dur-${yearStr}-${idx}`;
        _durMap[durId] = entry.dates;
        const startLabel = entryStartDate ? entryStartDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : dateParts[0];
        const dateDisplay = spansYears
          ? `<span onclick="toggleDuration('${durId}',event)" style="font-size:11px;color:#aaa;cursor:pointer;" title="Click to see duration">starts ${startLabel}</span>`
          : `<span onclick="toggleDuration('${durId}',event)" style="font-size:11px;color:#aaa;cursor:pointer;" title="Click to see duration">${formatDisplayDates(entry.dates)}</span>`;
        title.innerHTML = `<span onclick="toggleDuration('${durId}',event)" style="cursor:pointer;" title="Click to see duration">${entry.title}</span> ${dateDisplay}`;
        const buttons = document.createElement('div');
        buttons.style.cssText = 'display: flex; gap: 6px;';
        const editBtn = document.createElement('button');
        editBtn.textContent = '📝';
        editBtn.title = 'Edit';
        editBtn.style.cssText = 'padding: 2px 6px; font-size: 11px; border: 1px solid #ddd; color: #666; background: transparent; border-radius: 6px; cursor: pointer; line-height: 1;';
        editBtn.addEventListener('click', () => startEdit(yearStr, idx));
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '✕';
        deleteBtn.title = 'Delete';
        deleteBtn.style.cssText = 'padding: 2px 6px; font-size: 11px; border: 1px solid #ffcccc; color: #c33; background: transparent; border-radius: 6px; cursor: pointer; line-height: 1;';
        deleteBtn.addEventListener('click', () => deleteEntry(yearStr, idx));
        buttons.appendChild(editBtn);
        buttons.appendChild(deleteBtn);
        header.appendChild(title);
        header.appendChild(buttons);
        content.appendChild(header);
      }
      entryDiv.appendChild(content);
      yearSection.appendChild(entryDiv);
      if (gap && activeFilter === 'all' && !isEditing) {
        const gapDiv = document.createElement('div');
        gapDiv.style.cssText = 'display: flex; gap: 6px; margin-bottom: 0.2rem; padding: 3px 8px; background: #fffbf0; border-radius: 6px; font-size: 11px; color: #d97706; margin-left: 3px; cursor: pointer;';
        gapDiv.title = 'Click to add unemployment period';
        gapDiv.innerHTML = `<div style="width: 4px; height: 4px; border-radius: 50%; background: #d97706; flex-shrink: 0; margin-top: 4px;"></div><span><strong>Gap:</strong> ${gap.days} day${gap.days === 1 ? '' : 's'} until ${gap.nextTitle}</span>`;
        gapDiv.addEventListener('mouseenter', () => { gapDiv.style.background = '#fff3d0'; });
        gapDiv.addEventListener('mouseleave', () => { gapDiv.style.background = '#fffbf0'; });
        gapDiv.addEventListener('click', () => openGapModal(gap));
        yearSection.appendChild(gapDiv);
      }
    });
    timeline.appendChild(yearSection);
  });
}

function startEdit(year, index) {
  editingEntry = { year, index };
  renderTimeline();
}

function cancelEdit() {
  editingEntry = null;
  renderTimeline();
}

function saveEdit(year, index) {
  const newTitle = document.getElementById(`edit-title-${index}`).value.trim();
  const newStartDate = document.getElementById(`edit-start-${index}`).value;
  const newEndDate = document.getElementById(`edit-end-${index}`).value;
  const newCategory = document.getElementById(`edit-category-${index}`).value;
  if (!newTitle || (!newStartDate && !newEndDate)) {
    showMessage('Please fill in title and at least one date', 'error');
    return;
  }
  let dateStr = '';
  if (newStartDate) {
    const [year, month, day] = newStartDate.split('-');
    dateStr = `${month}/${day}/${year}`;
  }
  if (newEndDate) {
    const [year, month, day] = newEndDate.split('-');
    if (dateStr) {
      dateStr += ` - ${month}/${day}/${year}`;
    } else {
      dateStr = `- ${month}/${day}/${year}`;
    }
  } else {
    dateStr += ' -';
  }
  data[year][index] = { title: newTitle, dates: dateStr, category: newCategory };
  saveData();
  editingEntry = null;
  renderTimeline();
  showMessage('Entry updated', 'success');
}

function deleteEntry(year, index) {
  data[year].splice(index, 1);
  if (data[year].length === 0) delete data[year];
  saveData();
  renderTimeline();
  showMessage('Entry deleted', 'success');
}

function showMessage(text, type, force) {
  if (type !== 'error' && !force) return;
  const msgDiv = document.getElementById('message');
  msgDiv.style.cssText = `padding: 8px 10px; border-radius: 8px; font-size: 13px; background: ${type === 'error' ? '#ffcccc' : '#ccffcc'}; color: ${type === 'error' ? '#c33' : '#3c3'};`;
  msgDiv.textContent = text;
  setTimeout(() => { msgDiv.textContent = ''; msgDiv.style.cssText = ''; }, 3000);
}

document.getElementById('addBtn').addEventListener('click', () => {
  const title = document.getElementById('title').value.trim();
  const startDateVal = document.getElementById('startDate').value;
  const endDateVal = document.getElementById('endDate').value;
  const category = document.getElementById('category').value;
  if (!title || (!startDateVal && !endDateVal)) {
    showMessage('Please fill in title and at least one date', 'error');
    return;
  }
  let year = '';
  let dateStr = '';
  if (startDateVal) {
    const [startYear, startMonth, startDay] = startDateVal.split('-');
    year = startYear;
    dateStr = `${startMonth}/${startDay}/${startYear}`;
  } else if (endDateVal) {
    const [endYear, endMonth, endDay] = endDateVal.split('-');
    year = endYear;
    dateStr = `- ${endMonth}/${endDay}/${endYear}`;
  }
  if (endDateVal && startDateVal) {
    const [endYear, endMonth, endDay] = endDateVal.split('-');
    dateStr += ` - ${endMonth}/${endDay}/${endYear}`;
  } else if (endDateVal && !startDateVal) {
    const [endYear, endMonth, endDay] = endDateVal.split('-');
    dateStr = `- ${endMonth}/${endDay}/${endYear}`;
  } else if (startDateVal) {
    dateStr += ' -';
  }
  if (!data[year]) data[year] = [];
  data[year].push({ title, dates: dateStr, category });
  saveData();
  document.getElementById('title').value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  document.getElementById('category').value = 'broadway';
  renderTimeline();
  showMessage('Entry added successfully', 'success');
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset to default data?')) {
    localStorage.removeItem(STORAGE_KEY);
    data = loadData();
    editingEntry = null;
    renderTimeline();
    showMessage('Data reset to default', 'success');
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'job_history.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showMessage('Saved to job_history.json', 'success');
});

document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      data = JSON.parse(ev.target.result);
      saveData();
      editingEntry = null;
      renderTimeline();
      showMessage('Data loaded successfully', 'success', true);
    } catch {
      showMessage('Invalid file — could not load data', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

const _durMap = {};

function calcDuration(datesStr) {
  const parts = datesStr.split('-').map(d => d.trim());
  const start = parseDate(parts[0]);
  const endRaw = parts.length > 1 ? parts[1].trim() : null;
  const end = (endRaw && endRaw !== '' && endRaw !== 'Current') ? parseDate(endRaw) : null;
  const endDate = end || ((endRaw === '' || endRaw === 'Current') ? new Date() : null);
  if (!start || !endDate) return null;
  const totalDays = Math.round((endDate - start) / (1000 * 60 * 60 * 24));
  if (totalDays < 0) return null;
  const years = Math.floor(totalDays / 365);
  const months = Math.floor((totalDays % 365) / 30);
  const weeks = Math.floor((totalDays % 365 % 30) / 7);
  const days = totalDays % 365 % 30 % 7;
  const out = [];
  if (years > 0) out.push(`${years} yr${years !== 1 ? 's' : ''}`);
  if (months > 0) out.push(`${months} mo${months !== 1 ? 's' : ''}`);
  if (weeks > 0) out.push(`${weeks} wk${weeks !== 1 ? 's' : ''}`);
  if (days > 0) out.push(`${days} day${days !== 1 ? 's' : ''}`);
  return out.join(' ') || '0 days';
}

function toggleDuration(id, event) {
  event.stopPropagation();
  const popup = document.getElementById('durPopup');
  if (popup._currentId === id && popup.style.display !== 'none') {
    popup.style.display = 'none';
    popup._currentId = null;
    return;
  }
  const dur = calcDuration(_durMap[id]);
  if (!dur) return;
  popup.textContent = dur;
  popup._currentId = id;
  const rect = event.currentTarget.getBoundingClientRect();
  popup.style.display = 'block';
  const popW = popup.offsetWidth;
  let left = rect.left + rect.width / 2 - popW / 2;
  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - 8 - popW;
  popup.style.left = `${left + window.scrollX}px`;
  popup.style.top = `${rect.bottom + window.scrollY + 6}px`;
}

let currentGap = null;

function openGapModal(gap) {
  currentGap = gap;
  const modal = document.getElementById('gapModal');
  modal.style.display = 'flex';
  document.querySelector('input[name="gapOption"][value="entire"]').checked = true;
  toggleGapPartial(false);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('gapModalInfo').textContent = `${fmt(gap.gapStart)} — ${fmt(gap.gapEnd)} (${gap.days} days)`;
  document.getElementById('gapStartInput').value = dateObjToString(gap.gapStart);
  document.getElementById('gapEndInput').value = dateObjToString(gap.gapEnd);
  document.getElementById('gapStartInput').min = dateObjToString(gap.gapStart);
  document.getElementById('gapStartInput').max = dateObjToString(gap.gapEnd);
  document.getElementById('gapEndInput').min = dateObjToString(gap.gapStart);
  document.getElementById('gapEndInput').max = dateObjToString(gap.gapEnd);
}

function closeGapModal() {
  document.getElementById('gapModal').style.display = 'none';
  currentGap = null;
}

function toggleGapPartial(show) {
  const el = document.getElementById('gapPartialDates');
  el.style.display = show ? 'grid' : 'none';
}

function confirmGapModal() {
  if (!currentGap) return;
  const isPartial = document.querySelector('input[name="gapOption"]:checked').value === 'partial';
  let startDate, endDate;
  if (isPartial) {
    const s = document.getElementById('gapStartInput').value;
    const e = document.getElementById('gapEndInput').value;
    if (!s || !e) { showMessage('Please fill in both dates', 'error'); return; }
    startDate = new Date(s + 'T00:00:00');
    endDate = new Date(e + 'T00:00:00');
    if (startDate > endDate) { showMessage('Start date must be before end date', 'error'); return; }
    if (startDate < currentGap.gapStart || endDate > currentGap.gapEnd) {
      showMessage('Dates must fall within the gap', 'error'); return;
    }
  } else {
    startDate = currentGap.gapStart;
    endDate = currentGap.gapEnd;
  }
  const [sy, sm, sd] = [startDate.getFullYear(), startDate.getMonth() + 1, startDate.getDate()];
  const [ey, em, ed] = [endDate.getFullYear(), endDate.getMonth() + 1, endDate.getDate()];
  const dateStr = `${String(sm).padStart(2,'0')}/${String(sd).padStart(2,'0')}/${sy} - ${String(em).padStart(2,'0')}/${String(ed).padStart(2,'0')}/${ey}`;
  const year = String(sy);
  if (!data[year]) data[year] = [];
  data[year].push({ title: 'Unemployed', dates: dateStr, category: 'unemployed' });
  saveData();
  closeGapModal();
  renderTimeline();
  showMessage('Unemployment period added', 'success', true);
}

document.getElementById('gapModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('gapModal')) closeGapModal();
});

document.addEventListener('click', () => {
  const popup = document.getElementById('durPopup');
  popup.style.display = 'none';
  popup._currentId = null;
});

document.getElementById('pdfBtn').addEventListener('click', generateResumePDF);

function generateResumePDF() {
  const categoryOrder = ['broadway', 'healthcare', 'education', 'fitness', 'other'];
  const categoryLabels = {
    broadway: 'Broadway & Theatre',
    healthcare: 'Healthcare',
    education: 'Education',
    fitness: 'Fitness',
    other: 'Other'
  };

  // Collect all non-unemployed entries with parsed start dates
  const allEntries = [];
  Object.keys(data).forEach(year => {
    data[year].forEach(entry => {
      if (entry.category === 'unemployed') return;
      const dateParts = entry.dates.split('-').map(d => d.trim());
      const startDate = parseDate(dateParts[0]);
      allEntries.push({ ...entry, startDate, yearKey: year });
    });
  });
  allEntries.sort((a, b) => {
    const aDate = a.startDate || new Date(parseInt(a.yearKey), 0, 1);
    const bDate = b.startDate || new Date(parseInt(b.yearKey), 0, 1);
    return aDate - bDate;
  });

  // Group by category
  const grouped = {};
  categoryOrder.forEach(cat => { grouped[cat] = []; });
  allEntries.forEach(entry => {
    const cat = entry.category;
    if (grouped[cat]) grouped[cat].push(entry);
  });

  function fmtDate(str) {
    if (!str || str.trim() === '' || str.trim() === 'Current') return str ? str.trim() : '';
    const parsed = parseDate(str.trim());
    if (!parsed) return str.trim();
    return parsed.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function fmtDateRange(datesStr) {
    const parts = datesStr.split('-').map(d => d.trim());
    const start = fmtDate(parts[0]);
    const end = parts.length > 1 && parts[1] !== '' ? fmtDate(parts[1]) : 'Present';
    if (start && end) return `${start} – ${end}`;
    if (start) return `${start} – Present`;
    if (end) return `– ${end}`;
    return datesStr;
  }

  let sectionsHTML = '';
  categoryOrder.forEach(cat => {
    const entries = grouped[cat];
    if (!entries || entries.length === 0) return;
    const rowsHTML = entries.map(e => `
      <div class="entry">
        <span class="entry-title">${e.title}</span>
        <span class="entry-dates">${fmtDateRange(e.dates)}</span>
      </div>`).join('');
    sectionsHTML += `
      <div class="section">
        <div class="section-label">${categoryLabels[cat]}</div>
        ${rowsHTML}
      </div>`;
  });

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', Times, serif; color: #111; background: white; padding: 1in; font-size: 11pt; line-height: 1.5; text-transform: uppercase; }
  h1 { font-size: 22pt; font-weight: bold; letter-spacing: 1px; text-align: center; margin-bottom: 4px; text-transform: uppercase; }
  .subtitle { text-align: center; font-size: 10pt; color: #555; margin-bottom: 24px; letter-spacing: 0.5px; text-transform: uppercase; }
  .section { margin-bottom: 20px; }
  .section-label { font-size: 9pt; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; color: #555; border-bottom: 1px solid #bbb; padding-bottom: 3px; margin-bottom: 8px; }
  .entry { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .entry-title { font-size: 11pt; }
  .entry-dates { font-size: 9.5pt; color: #444; white-space: nowrap; margin-left: 16px; }
  @media print {
    body { padding: 0.6in 0.75in; }
    @page { margin: 0; }
  }
</style>
</head>
<body>
  <h1>Resume</h1>
  <div class="subtitle">Career History</div>
  ${sectionsHTML}
</body>
</html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.addEventListener('load', () => win.print());
}

renderTimeline();
